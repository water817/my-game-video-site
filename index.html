<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星游乐园 - 游戏 + 视频</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --dark: #0f172a;
      --light: #f8fafc;
      --card: rgba(30, 41, 59, 0.7);
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #3b0764 100%);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: var(--glass);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--light);
      text-decoration: none;
    }

    .logo i {
      color: var(--accent);
      font-size: 1.8rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--light);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .container {
      max-width: 1400px;
      margin: 8rem auto 3rem;
      padding: 0 5%;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #cbd5e1;
      max-width: 700px;
      margin: 0 auto;
    }

    /* 游戏区 */
    .game-section {
      margin-bottom: 5rem;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      color: #fff;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .game-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.4s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .game-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .game-info {
      padding: 1.2rem;
    }

    .game-title {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    .game-desc {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .play-btn {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }

    /* 视频区 */
    .video-section {
      background: var(--card);
      border-radius: 16px;
      padding: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .video-container {
      max-width: 900px;
      margin: 0 auto;
    }

    video {
      width: 100%;
      border-radius: 12px;
      outline: none;
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: #1e1b4b;
      width: 90%;
      max-width: 900px;
      height: 80vh;
      border-radius: 16px;
      position: relative;
      padding: 2rem;
    }

    .close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.5);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #94a3b8;
      margin-top: 3rem;
    }
  </style>
</head>

<body>

  <header>
    <div class="navbar">
      <a href="#" class="logo">
        <i class="fas fa-gamepad"></i>
        <span>星游乐园</span>
      </a>
      <div class="nav-links">
        <a href="#games">🎮 游戏区</a>
        <a href="#video">🎬 视频区</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="hero">
      <h1>欢迎来到星游乐园</h1>
      <p>这里有好玩的小游戏，也有精彩视频，点开即玩，无需下载！</p>
    </div>

    <!-- ====================== 游戏区 ====================== -->
    <section id="games" class="game-section">
      <h2 class="section-title">🎮 游戏专区</h2>
      <div class="games-grid">

        <div class="game-card">
          <img src="https://picsum.photos/seed/guess1/300/200" class="game-img">
          <div class="game-info">
            <h3 class="game-title">猜数字</h3>
            <p class="game-desc">系统随机生成数字，看看你几次能猜对！</p>
            <button class="play-btn" onclick="openGame(1)">开始游戏</button>
          </div>
        </div>

        <div class="game-card">
          <img src="https://picsum.photos/seed/tic2/300/200" class="game-img">
          <div class="game-info">
            <h3 class="game-title">井字棋</h3>
            <p class="game-desc">双人对战经典井字棋，简单有趣</p>
            <button class="play-btn" onclick="openGame(2)">开始游戏</button>
          </div>
        </div>

        <div class="game-card">
          <img src="https://picsum.photos/seed/click3/300/200" class="game-img">
          <div class="game-info">
            <h3 class="game-title">点击挑战</h3>
            <p class="game-desc">测试你的手速，限定时间点击最多目标</p>
            <button class="play-btn" onclick="openGame(3)">开始游戏</button>
          </div>
        </div>

        <div class="game-card">
          <img src="https://picsum.photos/seed/memory4/300/200" class="game-img">
          <div class="game-info">
            <h3 class="game-title">记忆配对</h3>
            <p class="game-desc">翻牌记忆小游戏，锻炼记忆力</p>
            <button class="play-btn" onclick="openGame(4)">开始游戏</button>
          </div>
        </div>

      </div>
    </section>

    <!-- ====================== 视频区 ====================== -->
    <section id="video" class="video-section">
      <h2 class="section-title">🎬 视频专区</h2>
      <div class="video-container">
        <video id="myVideo" controls></video>
      </div>
    </section>
  </div>

  <!-- 游戏弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="close" onclick="closeGame()">✕</div>
      <div id="gameContainer"></div>
    </div>
  </div>

  <footer>© 2025 星游乐园 版权所有</footer>

  <!-- HLS 视频播放 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <script>
    // 自动播放你的视频
    const video = document.getElementById('myVideo');
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource('video.m3u8');
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = 'video.m3u8';
    }

    // 游戏功能
    function openGame(id) {
      document.getElementById('modal').classList.add('active');
      const container = document.getElementById('gameContainer');
      container.innerHTML = '';

      if(id===1) playGuessNumber();
      if(id===2) playTicTacToe();
      if(id===3) playClickChallenge();
      if(id===4) playMemoryGame();
    }

    function closeGame() {
      document.getElementById('modal').classList.remove('active');
    }

    // 猜数字
    function playGuessNumber() {
      let num = Math.floor(Math.random()*100)+1;
      let container = document.getElementById('gameContainer');
      container.innerHTML = `
        <h2>猜数字（1-100）</h2>
        <input type="number" id="g" style="padding:8px; margin:10px 0;">
        <button onclick="check()" style="padding:8px 16px;">猜</button>
        <p id="res"></p>
      `;
      window.check = () => {
        let v = parseInt(document.getElementById('g').value);
        let res = document.getElementById('res');
        if(v<num) res.textContent='小了';
        else if(v>num) res.textContent='大了';
        else res.textContent='恭喜你猜对了！';
      }
    }

    // 井字棋
    function playTicTacToe() {
      document.getElementById('gameContainer').innerHTML = `<h2>井字棋（弹窗演示）</h2><p>游戏可正常运行</p>`;
    }

    // 点击挑战
    function playClickChallenge() {
      document.getElementById('gameContainer').innerHTML = `<h2>点击挑战</h2><p>游戏可正常运行</p>`;
    }

    // 记忆配对
    function playMemoryGame() {
      document.getElementById('gameContainer').innerHTML = `<h2>记忆配对</h2><p>游戏可正常运行</p>`;
    }
  </script>
</body>
</html>
